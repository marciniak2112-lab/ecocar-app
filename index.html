<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCarPro | Zarządzanie Samochodami</title>
    <meta name="description"
        content="EcoCarPro - Profesjonalny system zarządzania flotą i serwisem samochodowym. Monitoruj ceny, właścicieli i historię napraw w eleganckim wydaniu.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <div id="app">
        <header>
            <div class="logo">
                <span class="eco">Eco</span><span class="car">Car</span><span class="pro">Pro</span>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-secondary" title="Przełącz motyw">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="display:none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button id="add-car-btn" class="btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Dodaj Auto
                </button>
            </div>
        </header>

        <main>
            <section class="stats-overview">
                <div class="stat-card">
                    <span class="label">Pojazdy</span>
                    <span id="total-cars" class="value">0</span>
                </div>
                <div class="stat-card">
                    <span class="label">Łączna Wartość</span>
                    <span id="total-value" class="value">0 PLN</span>
                </div>
            </section>

            <section class="search-filter">
                <input type="text" id="search-input" placeholder="Szukaj modelu, marki lub właściciela...">
            </section>

            <section id="cars-grid" class="cars-grid">
                <!-- Car cards will be injected here -->
                <div class="empty-state">
                    <p>Brak samochodów w systemie. Kliknij "Dodaj Auto", aby zacząć.</p>
                </div>
            </section>
        </main>

        <!-- Modal for Adding/Editing Car -->
        <div id="car-modal" class="modal">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2 id="modal-title">Nowy Samochód</h2>
                    <button id="close-modal" class="btn-close">&times;</button>
                </div>
                <form id="car-form">
                    <input type="hidden" id="car-id">
                    <div class="form-group">
                        <label for="car-brand">Marka i Model</label>
                        <input type="text" id="car-brand" placeholder="np. Tesla Model 3" required>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="car-price">Cena (PLN)</label>
                            <input type="number" id="car-price" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="car-owner-phone">Telefon Właściciela</label>
                            <input type="tel" id="car-owner-phone" placeholder="123 456 789" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="car-history">Co zostało zrobione?</label>
                        <textarea id="car-history" placeholder="Opisz naprawy, serwis, modyfikacje..."
                            rows="4"></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="car-worker">Przypisz Pracownika</label>
                            <select id="car-worker" class="form-select">
                                <option value="">Wybierz pracownika...</option>
                                <option value="Adam">Adam</option>
                                <option value="Łukasz">Łukasz</option>
                                <option value="Nastka">Nastka</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Do zrobienia:</label>
                        <div class="checkbox-group">
                            <label class="checkbox-container">
                                <input type="checkbox" name="todo" value="Konserwacja podwozia">
                                <span class="checkmark"></span>
                                Konserwacja podwozia
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox" name="todo" value="Ceramika">
                                <span class="checkmark"></span>
                                Ceramika
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox" name="todo" value="Czyszczenie środka">
                                <span class="checkmark"></span>
                                Czyszczenie środka
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Zapisz Auto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
